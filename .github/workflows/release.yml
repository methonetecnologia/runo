name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: runo-linux-x64
            opentui_pkg: "@opentui/core-linux-x64"
          - target: bun-linux-arm64
            artifact: runo-linux-arm64
            opentui_pkg: "@opentui/core-linux-arm64"
          - target: bun-darwin-x64
            artifact: runo-darwin-x64
            opentui_pkg: "@opentui/core-darwin-x64"
          - target: bun-darwin-arm64
            artifact: runo-darwin-arm64
            opentui_pkg: "@opentui/core-darwin-arm64"
          - target: bun-windows-x64
            artifact: runo-windows-x64
            opentui_pkg: "@opentui/core-win32-x64"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install target platform binding
        run: |
          PKG="${{ matrix.opentui_pkg }}"
          VERSION="0.1.84"
          # npm pack downloads the tarball without platform checks
          npm pack "${PKG}@${VERSION}" --pack-destination /tmp
          # Extract into node_modules
          PKG_DIR="node_modules/$(echo $PKG | sed 's/@//;s/\//-/')"
          mkdir -p "node_modules/${PKG#@}"
          TARBALL=$(ls /tmp/opentui-core-*.tgz | head -1)
          tar xzf "$TARBALL" --strip-components=1 -C "node_modules/${PKG#@}"
          echo "Installed ${PKG} to node_modules/${PKG#@}"
          ls "node_modules/${PKG#@}"

      - name: Build binary
        run: bun run build.ts --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
